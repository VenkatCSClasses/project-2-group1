<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <script src="/static/selfcsp/htmx.2.0.8.min.js" defer></script>
        <link rel="stylesheet" href="/static/selfcsp/98.css" />
        <link rel="stylesheet" href="/static/selfcsp/style_default.css" />
        <title>Home Page</title>
    </head>
    <body>
        <main>
            <header>
                <h1>Home Page</h1>
                <!--Edit/view profile and logout buttons-->
            </header>
            <section class="add-households">
                <h2>Add Households</h2>
                <section class="create-household" aria-label="Create Household Form"></section>
                    <h3>Create New Household</h3>
                    <form hx-post="/create-household.html" hx-target="response-create">
                        <label for="household-name" aria-label="Household Name">Create Household:</label>
                        <input type="text" id="name" placeholder="Household Name" aria-placeholder="Input Household Name Here" >
                        <button type="submit" name="submit">Submit</button>
                        <div id="response-create"></div>
                    </form>
                </section>
                    <h3>Join Household</h3>
                <section class="join-household" aria-label="Join Household Form"></section>
                    <form hx-post="/join-household.html" hx-target="response-join">
                        <label for="household-name">Join Household Via Code:</label>
                        <input type="text" id="name" placeholder="Household Join Code" aria-placeholder="Input Household Join Code Here">
                        <button type="submit" name="submit">Submit</button>
                    </form>
                    <div id="response-join"></div>
                </section>
            </section>
            <section class="current-households">
                <h2>Current Households</h2>
                <section class="manager-households">
                    <h3>Manager Households</h3>
                    <div hx-get="/api/homepage/manager-households" hx-trigger="load" hx-swap="outerHTML"></div>
                </section>
                <section class="member-households">
                    <h3>Member Households</h3>
                    <div hx-get="/api/homepage/member-households" hx-trigger="load" hx-swap="outerHTML"></div>
                </section>
            </section>
        </main>
</html>
