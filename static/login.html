<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- INSERT_HEAD_HTML -->
    <title>Log In to SubSeer</title>
  </head>
  <body>
    <div class="window">
      <div class="title-bar">
        <div class="title-bar-text">
          Log In
        </div>
      </div>
      <div class="window-body">
        <form
          class="login-form"
          hx-get="/api/account/login"
          hx-trigger="load"
          hx-swap="outerHTML"
        >
          <label for="username">Username</label>
          <input type="text" id="username" name="username" disabled>
          <label for="password">Password</label>
          <input type="password" id="password" name="password" disabled>
          <input type="hidden" name="nonce" value="${nonce}" />
          <button type="submit" disabled>Login</button>
        </form>

        <br />
        <br />
        <p>
          If you don't have one already, you may <a href="/signup"
          >create a new account here</a>.
        </p>
      </div>
    </div>
  </body>
</html>
